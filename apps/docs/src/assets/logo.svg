<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#3B82F6" opacity="0.1"/>
  
  <!-- Effect Kit "E" logo -->
  <g transform="translate(50, 40)">
    <!-- Letter E with toolkit design -->
    <path d="M20 20 L20 100 L70 100 L70 85 L35 85 L35 65 L65 65 L65 50 L35 50 L35 35 L70 35 L70 20 Z" 
          fill="#3B82F6" 
          stroke="#10B981" 
          stroke-width="2"/>
    
    <!-- Toolkit elements -->
    <rect x="75" y="30" width="15" height="60" rx="2" fill="#10B981" opacity="0.8"/>
    <rect x="75" y="25" width="15" height="10" rx="2" fill="#F59E0B"/>
    <circle cx="82.5" cy="95" r="3" fill="#F59E0B"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="40" cy="40" r="3" fill="#10B981" opacity="0.5"/>
  <circle cx="160" cy="40" r="3" fill="#F59E0B" opacity="0.5"/>
  <circle cx="40" cy="160" r="3" fill="#F59E0B" opacity="0.5"/>
  <circle cx="160" cy="160" r="3" fill="#10B981" opacity="0.5"/>
</svg>